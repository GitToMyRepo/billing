apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-api
  labels:
    app: billing-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-api
  template:
    metadata:
      labels:
        app: billing-api
    spec:
      containers:
        - name: billing-api
          image: localhost:5000/billing-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            # Override application.properties values via environment variables
            # Spring Boot maps SPRING_DATASOURCE_URL -> spring.datasource.url automatically
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://billing-postgres:5432/billingdb
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: billing-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: billing-db-secret
                  key: password
            - name: SPRING_READ_DATASOURCE_URL
              value: jdbc:postgresql://billing-postgres:5432/billingdb
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: billing-api
spec:
  selector:
    app: billing-api
  type: NodePort       # exposes the service on a port on your local machine
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080  # access via http://localhost:30080

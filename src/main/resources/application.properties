# Server
server.port=8080

# DataSource - matches docker-compose.yml service
spring.datasource.url=jdbc:postgresql://localhost:5432/billingdb
spring.datasource.username=billing
spring.datasource.password=billing123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway - DB migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# App info
spring.application.name=billing-api

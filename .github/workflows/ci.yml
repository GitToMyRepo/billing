name: CI Pipeline

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and run unit tests
        run: ./mvnw test -pl .

      - name: Run full build with integration tests and coverage check
        run: ./mvnw verify -pl .

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests - already run in previous job)
        run: ./mvnw package -DskipTests

      - name: Build Docker image
        run: docker build -t billing-api:${{ github.sha }} .

      - name: Tag as latest
        run: docker tag billing-api:${{ github.sha }} billing-api:latest
